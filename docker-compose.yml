version: "3.8"

services:
  # The PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: cmpt-postgres
    restart: always
    environment:
      POSTGRES_USER: cmpt_user
      POSTGRES_PASSWORD: cmpt_password
      POSTGRES_DB: cmpt_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # The FastAPI Backend
  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: cmpt-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Explicitly tell the API to connect to the 'db' service above
      DATABASE_URL: postgresql://cmpt_user:cmpt_password@db:5432/cmpt_database
    depends_on:
      - db
    volumes:
      # Mount the backend directory so you don't have to rebuild docker on every code change
      - ./backend:/app

volumes:
  postgres_data:
